<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NT00 Radio - Escape The Algorithm</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="main-nav">
        <a href="index.html" class="active">🎵 Listen</a>
        <a href="schedule.html">📅 Schedule</a>
    </nav>
    
    <header>
        <h1>Escape The Algorithm</h1>
        <p class="tagline">Freeform Radio</p>
    </header>
    
    <main>
        <div class="player-container">
            <h2>Listen Live</h2>
            
          <iframe src="https://nt00.xyz/public/escape_the_algorithm/embed?primary_color=000000&bg_color=000000&text_color=ffffff&rounded=1" frameborder="0" allowtransparency="true" style="width: 100%; min-height: 150px; height: 150px; border: 0;"></iframe>
        </div>
    </main>
    
    <footer>
       <p>© 2026 Escape The Algorithm</p>
    </footer>
<!-- GhostChat - Zero Storage Chat Widget (Fully Fixed) -->
<div id="ghostchat-container" style="position: fixed; bottom: 20px; right: 20px; width: 320px; height: 400px; z-index: 1000; display: none;"></div>

<script>
  (function() {
    // CONFIGURATION - YOUR WORKER URL
    const SIGNALING_SERVER = 'https://ghostchat-signaling.nt00-161.workers.dev';
    const ROOM_NAME = 'escape_algorithm_radio';
    
    // Track seen messages to prevent duplicates
    const seenMessages = new Set();
    
    // Load saved messages from localStorage (with timestamps)
    let localMessages = [];
    try {
      const saved = localStorage.getItem(`chat_${ROOM_NAME}_messages`);
      if (saved) {
        const parsed = JSON.parse(saved);
        const now = Date.now();
        const tenMinutes = 10 * 60 * 1000;
        
        // Only keep messages less than 10 minutes old
        localMessages = parsed.filter(msg => (now - msg.timestamp) < tenMinutes);
        
        // Save back cleaned list
        localStorage.setItem(`chat_${ROOM_NAME}_messages`, JSON.stringify(localMessages));
      }
    } catch (e) {
      // Ignore localStorage errors
    }
    
    // Create chat container
    const container = document.getElementById('ghostchat-container');
    
    // Add toggle button (black theme)
    const toggleBtn = document.createElement('button');
    toggleBtn.innerHTML = '💬 Chat';
    toggleBtn.style.cssText = `
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #000000;
      color: #ffffff;
      border: 1px solid #333333;
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      z-index: 999;
      transition: transform 0.2s;
      font-weight: bold;
    `;
    toggleBtn.onmouseover = () => toggleBtn.style.transform = 'scale(1.05)';
    toggleBtn.onmouseout = () => toggleBtn.style.transform = 'scale(1)';
    toggleBtn.onclick = () => {
      if (container.style.display === 'none' || container.style.display === '') {
        container.style.display = 'block';
        toggleBtn.innerHTML = '✖ Close Chat';
      } else {
        container.style.display = 'none';
        toggleBtn.innerHTML = '💬 Chat';
      }
    };
    document.body.appendChild(toggleBtn);
    
    // Create chat interface (all black theme)
    container.innerHTML = `
      <div style="display: flex; flex-direction: column; height: 100%; background: #000000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333333;">
        <div style="background: #111111; padding: 12px; color: #ffffff; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px solid #333333;">
          <span>💬 Radio Chat</span>
          <span style="font-size: 12px; opacity: 0.8;">⏱️ 10min retention</span>
        </div>
        
        <div id="chat-messages" style="flex: 1; overflow-y: auto; padding: 12px; color: #ffffff; font-size: 14px; background: #000000;"></div>
        
        <div style="padding: 12px; border-top: 1px solid #333333; background: #111111;">
          <div style="display: flex; gap: 8px;">
            <input id="chat-input" type="text" placeholder="Type a message..." style="flex: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid #333333; background: #000000; color: #ffffff; outline: none;">
            <button id="send-btn" style="background: #333333; color: #ffffff; border: 1px solid #444444; border-radius: 20px; padding: 8px 16px; cursor: pointer; font-weight: bold;">Send</button>
          </div>
          <div style="font-size: 11px; color: #666666; margin-top: 8px; text-align: center;">
            ⚡ Messages saved for 10 minutes • Close button works!
          </div>
        </div>
      </div>
    `;
    
    // Chat logic
    const peerId = Math.random().toString(36).substring(2, 8);
    const messagesDiv = document.getElementById('chat-messages');
    
    // Save messages to localStorage
    function saveMessages() {
      try {
        localStorage.setItem(`chat_${ROOM_NAME}_messages`, JSON.stringify(localMessages));
      } catch (e) {
        // Ignore storage errors
      }
    }
    
    // Load and display existing messages
    function loadExistingMessages() {
      const now = Date.now();
      const tenMinutes = 10 * 60 * 1000;
      
      localMessages.forEach(msg => {
        if (now - msg.timestamp < tenMinutes) {
          displayMessage(msg.sender, msg.text, msg.isSelf, false);
        }
      });
    }
    
    // Display message without saving
    function displayMessage(sender, text, isSelf = false, addToStorage = true) {
      const msgContainer = document.createElement('div');
      msgContainer.classList.add('message-timestamp');
      msgContainer.dataset.timestamp = Date.now();
      msgContainer.style.cssText = `margin: 8px 0; display: flex; ${isSelf ? 'justify-content: flex-end;' : 'justify-content: flex-start;'}`;
      
      const msgBubble = document.createElement('div');
      msgBubble.style.cssText = `
        max-width: 80%;
        padding: 8px 12px;
        border-radius: 18px;
        background: ${isSelf ? '#333333' : '#111111'};
        color: #ffffff;
        word-wrap: break-word;
        border: 1px solid #444444;
      `;
      
      const nameSpan = document.createElement('div');
      nameSpan.style.cssText = 'font-size: 11px; opacity: 0.7; margin-bottom: 4px; color: #999999;';
      nameSpan.textContent = sender === peerId ? 'You' : 'Listener ' + sender.substr(0, 4);
      
      const textSpan = document.createElement('div');
      textSpan.textContent = text;
      
      msgBubble.appendChild(nameSpan);
      msgBubble.appendChild(textSpan);
      msgContainer.appendChild(msgBubble);
      messagesDiv.appendChild(msgContainer);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      
      if (addToStorage) {
        localMessages.push({
          sender,
          text,
          isSelf,
          timestamp: Date.now()
        });
        saveMessages();
      }
    }
    
    // Clean old messages function
    function cleanOldMessages() {
      const now = Date.now();
      const tenMinutes = 10 * 60 * 1000;
      
      // Filter localMessages
      const beforeCount = localMessages.length;
      localMessages = localMessages.filter(msg => (now - msg.timestamp) < tenMinutes);
      
      if (beforeCount !== localMessages.length) {
        saveMessages();
        
        // Refresh display
        messagesDiv.innerHTML = '';
        
        // Add system message back
        const systemMsg = document.createElement('div');
        systemMsg.style.cssText = 'color: #666666; font-style: italic; text-align: center; margin: 8px 0; font-size: 12px;';
        systemMsg.textContent = '✨ Messages last for 10 minutes.';
        messagesDiv.appendChild(systemMsg);
        
        // Redisplay messages
        localMessages.forEach(msg => {
          displayMessage(msg.sender, msg.text, msg.isSelf, false);
        });
      }
    }
    
    // Add system message
    const systemMsg = document.createElement('div');
    systemMsg.style.cssText = 'color: #666666; font-style: italic; text-align: center; margin: 8px 0; font-size: 12px;';
    systemMsg.textContent = '✨ Messages last for 10 minutes.';
    messagesDiv.appendChild(systemMsg);
    
    // Load any existing messages
    loadExistingMessages();
    
    // Run cleanup every minute
    setInterval(cleanOldMessages, 60000);
    
    // Send message function
    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      
      // Create unique message ID
      const messageId = Date.now() + '-' + Math.random().toString(36);
      const timestamp = Date.now();
      
      // Display locally
      displayMessage(peerId, text, true);
      
      // Send to signaling server
      try {
        await fetch(`${SIGNALING_SERVER}?room=${ROOM_NAME}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            id: messageId,
            sender: peerId,
            text: text,
            timestamp: timestamp
          })
        });
        
        // Mark as seen
        seenMessages.add(messageId);
      } catch (err) {
        console.log('Send error:', err);
      }
      
      input.value = '';
    }
    
    // Poll for new messages
    async function pollMessages() {
      try {
        const response = await fetch(`${SIGNALING_SERVER}?room=${ROOM_NAME}`);
        const data = await response.json();
        
        const now = Date.now();
        const tenMinutes = 10 * 60 * 1000;
        
        // Handle single message
        if (data.id && !seenMessages.has(data.id) && data.sender !== peerId) {
          if (now - data.timestamp < tenMinutes) {
            seenMessages.add(data.id);
            displayMessage(data.sender, data.text, false);
          }
        }
        
        // Handle array of messages
        if (Array.isArray(data)) {
          data.forEach(msg => {
            if (!seenMessages.has(msg.id) && msg.sender !== peerId) {
              if (now - msg.timestamp < tenMinutes) {
                seenMessages.add(msg.id);
                displayMessage(msg.sender, msg.text, false);
              }
            }
          });
        }
      } catch (err) {
        // Silent fail
      }
    }
    
    // Send message on button click or Enter
    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('chat-input').onkeypress = (e) => {
      if (e.key === 'Enter') sendMessage();
    };
    
    // Poll for new messages every 3 seconds
    setInterval(pollMessages, 3000);
    
    // Clear old seen messages every 10 minutes
    setInterval(() => {
      seenMessages.clear();
    }, 600000);
    
  })();
</script>
</body>
</html>
