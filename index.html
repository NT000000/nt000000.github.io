  <!-- Custom Minimal Black Chat with 5-Hour Auto-Delete -->
<div style="margin-top: 25px; width: 100%; max-width: 400px; margin-left: auto; margin-right: auto;">
    <!-- Chat Header with Icon -->
    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">

                <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="white"/>
                <path d="M7 9H17M7 13H14" stroke="white" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </div>
        <h3 style="color: white; font-weight: 300; letter-spacing: 0.5px; margin: 0;">Listener Chat</h3>
        <span style="color: rgba(255,255,255,0.3); font-size: 0.7rem; margin-left: auto;">5hr auto-delete</span>
    </div>

    <!-- Chat Messages Area -->
    <div id="custom-chat-messages" style="height: 300px; overflow-y: auto; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); border-radius: 16px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1);"></div>
    
    <!-- Chat Input Area -->
    <div style="display: flex; gap: 8px; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); border-radius: 50px; padding: 4px; border: 1px solid rgba(255,255,255,0.1);">
        <input id="custom-chat-input" type="text" placeholder="Type a message..." 
               style="flex: 1; padding: 12px 16px; border-radius: 50px; border: none; background: transparent; color: white; font-size: 14px; outline: none;">
        <button id="custom-chat-send" style="background: #667eea; color: white; border: none; border-radius: 50px; padding: 8px 20px; cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 5px; transition: all 0.2s;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
            Send
        </button>
    </div>
    
    <!-- Status Text -->
    <div style="display: flex; justify-content: space-between; margin-top: 8px; color: rgba(255,255,255,0.3); font-size: 0.65rem;">
        <span>⚡ Anonymous · No tracking</span>
        <span id="message-count">0 messages</span>
    </div>
</div>

<script>
(function() {
    // Configuration
    const CHAT_KEY = 'escape_algorithm_chat';
    const FIVE_HOURS = 5 * 60 * 60 * 1000; // 5 hours in milliseconds
    const MAX_MESSAGES = 100;
    
    // Generate anonymous username
    const username = 'Listener_' + Math.random().toString(36).substring(2, 6);
    
    // Get elements
    const messagesDiv = document.getElementById('custom-chat-messages');
    const input = document.getElementById('custom-chat-input');
    const sendBtn = document.getElementById('custom-chat-send');
    const messageCountSpan = document.getElementById('message-count');
    
    // Load and clean old messages
    let messages = [];
    try {
        const saved = localStorage.getItem(CHAT_KEY);
        if (saved) {
            const allMessages = JSON.parse(saved);
            const now = Date.now();
            
            // Filter out messages older than 5 hours
            messages = allMessages.filter(msg => 
                (now - msg.timestamp) < FIVE_HOURS
            );
            
            // Keep only last MAX_MESSAGES
            if (messages.length > MAX_MESSAGES) {
                messages = messages.slice(-MAX_MESSAGES);
            }
            
            // Save cleaned messages back
            localStorage.setItem(CHAT_KEY, JSON.stringify(messages));
        }
    } catch(e) {
        console.log('Error loading messages:', e);
    }
    
    // Display existing messages
    messages.forEach(msg => {
        addMessageToDOM(msg.text, msg.sender === username, msg.sender);
    });
    
    updateMessageCount();
    
    // Function to add message to DOM
    function addMessageToDOM(text, isMe = false, senderName = '') {
        const msgDiv = document.createElement('div');
        msgDiv.style.margin = '12px 0';
        msgDiv.style.display = 'flex';
        msgDiv.style.justifyContent = isMe ? 'flex-end' : 'flex-start';
        msgDiv.style.opacity = '0';
        msgDiv.style.animation = 'fadeIn 0.3s ease forwards';
        
        // Add animation style
        if (!document.getElementById('chat-animation')) {
            const style = document.createElement('style');
            style.id = 'chat-animation';
            style.textContent = `
                @keyframes fadeIn {
                    from { opacity: 0; transform: translateY(10px); }
                    to { opacity: 1; transform: translateY(0); }
                }
            `;
            document.head.appendChild(style);
        }
        
        const bubble = document.createElement('div');
        bubble.style.maxWidth = '80%';
        bubble.style.padding = '10px 14px';
        bubble.style.borderRadius = '18px';
        bubble.style.background = isMe ? '#667eea' : '#1a1a1a';
        bubble.style.color = 'white';
        bubble.style.boxShadow = '0 2px 8px rgba(0,0,0,0.2)';
        bubble.style.wordWrap = 'break-word';
        
        const nameSpan = document.createElement('div');
        nameSpan.style.fontSize = '11px';
        nameSpan.style.opacity = '0.7';
        nameSpan.style.marginBottom = '4px';
        nameSpan.style.color = isMe ? 'rgba(255,255,255,0.9)' : '#999';
        nameSpan.textContent = isMe ? 'You' : (senderName || 'Anonymous');
        
        const textSpan = document.createElement('div');
        textSpan.style.fontSize = '14px';
        textSpan.style.lineHeight = '1.4';
        textSpan.textContent = text;
        
        bubble.appendChild(nameSpan);
        bubble.appendChild(textSpan);
        msgDiv.appendChild(bubble);
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    // Save message to localStorage
    function saveMessage(text, isMe, senderName) {
        messages.push({
            text: text,
            sender: senderName,
            isMe: isMe,
            timestamp: Date.now()
        });
        
        // Keep only last MAX_MESSAGES
        if (messages.length > MAX_MESSAGES) {
            messages = messages.slice(-MAX_MESSAGES);
        }
        
        localStorage.setItem(CHAT_KEY, JSON.stringify(messages));
        updateMessageCount();
    }
    
    // Update message count display
    function updateMessageCount() {
        messageCountSpan.textContent = `${messages.length} messages`;
    }
    
    // Clean old messages (runs every hour)
    function cleanOldMessages() {
        const now = Date.now();
        const beforeCount = messages.length;
        
        messages = messages.filter(msg => 
            (now - msg.timestamp) < FIVE_HOURS
        );
        
        if (messages.length !== beforeCount) {
            // Refresh display
            messagesDiv.innerHTML = '';
            messages.forEach(msg => {
                addMessageToDOM(msg.text, msg.sender === username, msg.sender);
            });
            localStorage.setItem(CHAT_KEY, JSON.stringify(messages));
            updateMessageCount();
        }
    }
    
    // Send message
    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;
        
        // Add to DOM
        addMessageToDOM(text, true, username);
        
        // Save
        saveMessage(text, true, username);
        
        // Simulate receiving message (for demo - replace with real sync)
        // In a real implementation, you'd use WebSocket or polling
        setTimeout(() => {
            if (Math.random() > 0.7) { // 30% chance of "response"
                const demoResponse = [
                    "Great track!",
                    "Love this station",
                    "🎵🎵🎵",
                    "Hello from another listener!",
                    "What's playing?",
                    "🔥🔥🔥"
                ][Math.floor(Math.random() * 6)];
                
                const randomUser = 'Listener_' + Math.random().toString(36).substring(2, 4);
                addMessageToDOM(demoResponse, false, randomUser);
                saveMessage(demoResponse, false, randomUser);
            }
        }, 2000);
        
        input.value = '';
    }
    
    // Event listeners
    sendBtn.onclick = sendMessage;
    input.onkeypress = (e) => {
        if (e.key === 'Enter') sendMessage();
    };
    
    // Auto-clean every hour
    setInterval(cleanOldMessages, 60 * 60 * 1000);
    
    // Handle storage events for cross-tab sync
    window.addEventListener('storage', (e) => {
        if (e.key === CHAT_KEY && e.newValue) {
            const newMessages = JSON.parse(e.newValue);
            if (newMessages.length > messages.length) {
                const newMsg = newMessages[newMessages.length - 1];
                if (newMsg.sender !== username) {
                    addMessageToDOM(newMsg.text, false, newMsg.sender);
                    messages = newMessages;
                    updateMessageCount();
                }
            }
        }
    });
})();
</script>
