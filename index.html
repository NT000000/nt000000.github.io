<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NT00 Radio - Escape The Algorithm</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Additional inline fixes to ensure player looks good */
        .player-container iframe {
            width: 100% !important;
            max-width: 100% !important;
            height: 150px !important;
            border-radius: 12px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
        }
        
        @media (max-width: 600px) {
            .player-container iframe {
                height: 130px !important;
            }
        }
    </style>
</head>
<body>
    <nav class="main-nav">
        <a href="index.html" class="active">🔊 Listen</a>
        <a href="schedule.html">📅 Schedule</a>
    </nav>
    
    <header class="station-header">
        <h1>Escape The Algorithm</h1>
        <p class="tagline">Freeform Radio</p>
    </header>
    
    <main>
        <div class="player-container">
            <h2>Listen Live</h2>
            
            <!-- Fixed player embed -->
            <iframe src="https://nt00.xyz/public/escape_the_algorithm/embed?primary_color=000000&bg_color=000000&text_color=ffffff&rounded=1" 
                    frameborder="0" 
                    allowtransparency="true" 
                    style="width: 100%; height: 150px; border: 0; border-radius: 12px;"
                    allow="autoplay; encrypted-media">
            </iframe>
        </div>
    </main>
    
    <footer>
       <p>© 2026 Escape The Algorithm</p>
    </footer>

 <!-- Simple Chat Widget - GUARANTEED WORKING -->
<div id="chat-container" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;">
    <button id="chat-toggle" style="background: #000000; color: white; border: 1px solid #333; border-radius: 50px; padding: 12px 24px; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-weight: bold; width: 120px;">
        💬 Chat
    </button>
    
    <div id="chat-box" style="display: none; position: absolute; bottom: 70px; right: 0; width: 320px; height: 400px; background: #000000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333333;">
        <div style="background: #111111; padding: 12px; color: white; font-weight: bold; border-bottom: 1px solid #333;">
            <span>💬 Radio Chat</span>
        </div>
        
        <div id="chat-messages" style="height: 290px; overflow-y: auto; padding: 12px; color: white; font-size: 14px; background: #000000;"></div>
        
        <div style="padding: 12px; border-top: 1px solid #333; background: #111111;">
            <div style="display: flex; gap: 8px;">
                <input id="chat-input" type="text" placeholder="Type a message..." style="flex: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid #333; background: #000; color: white; outline: none;">
                <button id="chat-send" style="background: #333; color: white; border: 1px solid #444; border-radius: 20px; padding: 8px 16px; cursor: pointer;">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    // Configuration
    const ROOM = 'escape_algorithm_radio';
    const SERVER = 'https://ghostchat-signaling.nt00-161.workers.dev';
    const USER_ID = 'user_' + Math.random().toString(36).substring(2, 8);
    
    // Get elements
    const toggle = document.getElementById('chat-toggle');
    const box = document.getElementById('chat-box');
    const messages = document.getElementById('chat-messages');
    const input = document.getElementById('chat-input');
    const send = document.getElementById('chat-send');
    
    // State
    let lastMessageTime = 0;
    let messageCount = 0;
    
    // Toggle chat
    toggle.onclick = function() {
        if (box.style.display === 'none' || box.style.display === '') {
            box.style.display = 'block';
            toggle.innerHTML = '✖ Close';
            loadMessages();
        } else {
            box.style.display = 'none';
            toggle.innerHTML = '💬 Chat';
        }
    };
    
    // Add message to display
    function addMessage(text, sender, isMe) {
        const div = document.createElement('div');
        div.style.margin = '8px 0';
        div.style.display = 'flex';
        div.style.justifyContent = isMe ? 'flex-end' : 'flex-start';
        
        const bubble = document.createElement('div');
        bubble.style.maxWidth = '80%';
        bubble.style.padding = '8px 12px';
        bubble.style.borderRadius = '18px';
        bubble.style.background = isMe ? '#333' : '#111';
        bubble.style.color = 'white';
        bubble.style.border = '1px solid #444';
        
        const name = document.createElement('div');
        name.style.fontSize = '11px';
        name.style.opacity = '0.7';
        name.style.marginBottom = '4px';
        name.style.color = '#999';
        name.textContent = isMe ? 'You' : 'User ' + sender.substring(5, 9);
        
        const msgText = document.createElement('div');
        msgText.textContent = text;
        
        bubble.appendChild(name);
        bubble.appendChild(msgText);
        div.appendChild(bubble);
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }
    
    // Load messages from server
    async function loadMessages() {
        try {
            const res = await fetch(`${SERVER}?room=${ROOM}`);
            const data = await res.json();
            
            if (data && data.text && data.sender !== USER_ID) {
                if (data.time > lastMessageTime) {
                    lastMessageTime = data.time;
                    addMessage(data.text, data.sender, false);
                }
            }
        } catch(e) {}
    }
    
    // Send message
    async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;
        
        const time = Date.now();
        const message = {
            room: ROOM,
            sender: USER_ID,
            text: text,
            time: time,
            id: time + '-' + messageCount++
        };
        
        // Show immediately
        addMessage(text, USER_ID, true);
        
        // Send to server
        try {
            await fetch(`${SERVER}?room=${ROOM}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(message)
            });
            lastMessageTime = time;
        } catch(e) {}
        
        input.value = '';
    }
    
    // Event listeners
    send.onclick = sendMessage;
    input.onkeypress = (e) => {
        if (e.key === 'Enter') sendMessage();
    };
    
    // Check for new messages every 2 seconds
    setInterval(loadMessages, 2000);
    
    // Initial load
    setTimeout(loadMessages, 1000);
    
})();
</script>
</body>
</html>
