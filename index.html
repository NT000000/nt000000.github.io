<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NT00 Radio - Escape The Algorithm</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="main-nav">
        <a href="index.html" class="active">🔊 Listen</a>
        <a href="schedule.html">📅 Schedule</a>
    </nav>
    
    <header>
        <h1>Escape The Algorithm</h1>
        <p class="tagline">Freeform Radio</p>
    </header>
    
    <main>
        <div class="player-container">
            <h2>Listen Live</h2>
            
          <iframe src="https://nt00.xyz/public/escape_the_algorithm/embed?primary_color=000000&bg_color=000000&text_color=ffffff&rounded=1" frameborder="0" allowtransparency="true" style="width: 100%; min-height: 150px; height: 150px; border: 0;"></iframe>
        </div>
    </main>
    
    <footer>
       <p>© 2026 Escape The Algorithm</p>
    </footer>

    <!-- GhostChat - Zero Storage Chat Widget (FIXED CLOSE BUTTON) -->
<div id="ghostchat-container" style="position: fixed; bottom: 20px; right: 20px; width: 320px; height: 400px; z-index: 1000; display: none;"></div>

<script>
  (function() {
    // CONFIGURATION
    const SIGNALING_SERVER = 'https://ghostchat-signaling.nt00-161.workers.dev';
    const ROOM_NAME = 'escape_algorithm_radio';
    const TEN_MINUTES = 10 * 60 * 1000; // 600,000 ms
    
    // Generate unique client ID
    const clientId = Math.random().toString(36).substring(2, 10);
    
    // Track message IDs we've seen
    const seenMessageIds = new Set();
    
    // Load saved messages from localStorage
    let messageHistory = [];
    try {
      const saved = localStorage.getItem(`chat_history_${ROOM_NAME}`);
      if (saved) {
        const parsed = JSON.parse(saved);
        const now = Date.now();
        // Only keep messages less than 10 minutes old
        messageHistory = parsed.filter(msg => (now - msg.timestamp) < TEN_MINUTES);
        localStorage.setItem(`chat_history_${ROOM_NAME}`, JSON.stringify(messageHistory));
      }
    } catch (e) {
      // Ignore localStorage errors
    }
    
    // Create chat container
    const container = document.getElementById('ghostchat-container');
    
    // Add toggle button
    const toggleBtn = document.createElement('button');
    toggleBtn.innerHTML = '💬 Chat';
    toggleBtn.style.cssText = `
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #000000;
      color: #ffffff;
      border: 1px solid #333333;
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      z-index: 999;
      transition: transform 0.2s;
      font-weight: bold;
    `;
    toggleBtn.onmouseover = () => toggleBtn.style.transform = 'scale(1.05)';
    toggleBtn.onmouseout = () => toggleBtn.style.transform = 'scale(1)';
    
    // FIXED TOGGLE FUNCTION
    toggleBtn.onclick = function() {
      if (container.style.display === 'none' || container.style.display === '') {
        container.style.display = 'block';
        toggleBtn.innerHTML = '✖ Close Chat';
      } else {
        container.style.display = 'none';
        toggleBtn.innerHTML = '💬 Chat';
      }
    };
    
    document.body.appendChild(toggleBtn);
    
    // Create chat interface
    container.innerHTML = `
      <div style="display: flex; flex-direction: column; height: 100%; background: #000000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333333;">
        <div style="background: #111111; padding: 12px; color: #ffffff; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px solid #333333;">
          <span>💬 Radio Chat</span>
          <span style="font-size: 12px; opacity: 0.8;">⏱️ 10min</span>
        </div>
        
        <div id="chat-messages" style="flex: 1; overflow-y: auto; padding: 12px; color: #ffffff; font-size: 14px; background: #000000;"></div>
        
        <div style="padding: 12px; border-top: 1px solid #333333; background: #111111;">
          <div style="display: flex; gap: 8px;">
            <input id="chat-input" type="text" placeholder="Type a message..." style="flex: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid #333333; background: #000000; color: #ffffff; outline: none;">
            <button id="send-btn" style="background: #333333; color: #ffffff; border: 1px solid #444444; border-radius: 20px; padding: 8px 16px; cursor: pointer; font-weight: bold;">Send</button>
          </div>
          <div style="font-size: 11px; color: #666666; margin-top: 8px; text-align: center;">
            ⚡ Messages saved for 10 minutes • Click Chat/Close to toggle
          </div>
        </div>
      </div>
    `;
    
    const messagesDiv = document.getElementById('chat-messages');
    
    // Display a message in the chat
    function displayMessage(sender, text, isSelf = false, timestamp = Date.now()) {
      const msgContainer = document.createElement('div');
      msgContainer.style.cssText = `margin: 8px 0; display: flex; ${isSelf ? 'justify-content: flex-end;' : 'justify-content: flex-start;'}`;
      
      const msgBubble = document.createElement('div');
      msgBubble.style.cssText = `
        max-width: 80%;
        padding: 8px 12px;
        border-radius: 18px;
        background: ${isSelf ? '#333333' : '#111111'};
        color: #ffffff;
        word-wrap: break-word;
        border: 1px solid #444444;
      `;
      
      const nameSpan = document.createElement('div');
      nameSpan.style.cssText = 'font-size: 11px; opacity: 0.7; margin-bottom: 4px; color: #999999;';
      nameSpan.textContent = sender === clientId ? 'You' : 'Listener ' + sender.substr(0, 4);
      
      const textSpan = document.createElement('div');
      textSpan.textContent = text;
      
      msgBubble.appendChild(nameSpan);
      msgBubble.appendChild(textSpan);
      msgContainer.appendChild(msgBubble);
      messagesDiv.appendChild(msgContainer);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    // Load message history
    function loadMessageHistory() {
      // Clear existing messages except system message
      messagesDiv.innerHTML = '';
      
      // Add system message
      const systemMsg = document.createElement('div');
      systemMsg.style.cssText = 'color: #666666; font-style: italic; text-align: center; margin: 8px 0; font-size: 12px;';
      systemMsg.textContent = '✨ Messages saved for 10 minutes.';
      messagesDiv.appendChild(systemMsg);
      
      // Display history
      messageHistory.forEach(msg => {
        displayMessage(msg.sender, msg.text, msg.sender === clientId, msg.timestamp);
        if (msg.id) seenMessageIds.add(msg.id);
      });
    }
    
    // Save message to history
    function saveMessage(message) {
      messageHistory.push(message);
      
      // Keep only last 100 messages
      if (messageHistory.length > 100) {
        messageHistory = messageHistory.slice(-100);
      }
      
      try {
        localStorage.setItem(`chat_history_${ROOM_NAME}`, JSON.stringify(messageHistory));
      } catch (e) {
        // Ignore localStorage errors
      }
    }
    
    // Clean old messages
    function cleanOldMessages() {
      const now = Date.now();
      const beforeCount = messageHistory.length;
      messageHistory = messageHistory.filter(msg => (now - msg.timestamp) < TEN_MINUTES);
      
      if (beforeCount !== messageHistory.length) {
        try {
          localStorage.setItem(`chat_history_${ROOM_NAME}`, JSON.stringify(messageHistory));
        } catch (e) {}
        loadMessageHistory();
      }
    }
    
    // Send message
    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      
      const messageId = Date.now() + '-' + Math.random().toString(36).substring(2);
      const timestamp = Date.now();
      
      // Create message object
      const message = {
        id: messageId,
        sender: clientId,
        text: text,
        timestamp: timestamp
      };
      
      // Display immediately
      displayMessage(clientId, text, true, timestamp);
      saveMessage(message);
      seenMessageIds.add(messageId);
      
      // Send to server
      try {
        await fetch(`${SIGNALING_SERVER}?room=${ROOM_NAME}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(message)
        });
      } catch (err) {
        console.log('Send error:', err);
      }
      
      input.value = '';
    }
    
    // Poll for new messages
    let pollCount = 0;
    async function pollMessages() {
      try {
        const response = await fetch(`${SIGNALING_SERVER}?room=${ROOM_NAME}`);
        const messages = await response.json();
        
        if (Array.isArray(messages)) {
          messages.forEach(msg => {
            // Skip if we've already seen this message
            if (seenMessageIds.has(msg.id)) return;
            
            // Skip our own messages (already displayed)
            if (msg.sender === clientId) {
              seenMessageIds.add(msg.id);
              return;
            }
            
            // Check if message is still valid (less than 10 minutes old)
            const now = Date.now();
            if (now - msg.timestamp < TEN_MINUTES) {
              seenMessageIds.add(msg.id);
              displayMessage(msg.sender, msg.text, false, msg.timestamp);
              saveMessage(msg);
            }
          });
        }
      } catch (err) {
        // Silent fail after first few attempts
        pollCount++;
        if (pollCount < 5) console.log('Poll error:', err);
      }
    }
    
    // Set up event listeners
    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('chat-input').onkeypress = (e) => {
      if (e.key === 'Enter') sendMessage();
    };
    
    // Initialize
    loadMessageHistory();
    
    // Start polling
    setInterval(pollMessages, 3000);
    setInterval(cleanOldMessages, 60000); // Clean every minute
    
    // Poll immediately
    setTimeout(pollMessages, 1000);
    
  })();
</script>
</body>
</html>
