<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape The Algorithm | Freeform Radio</title>
    <meta name="description" content="Freeform Radio - 24/7 underground sounds and electronic music">
    
    <!-- Font Awesome for social icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation with all sections -->
    <nav class="main-nav">
        <div class="nav-container">
            <a href="index.html" class="active">🔊 Listen</a>
            <a href="schedule.html">📅 Schedule</a>
            <a href="about.html">ℹ️ About</a>
        </div>
    </nav>
    
    <!-- Header -->
    <header class="station-header">
        <h1>Escape The Algorithm</h1>
        <p class="station-tagline">Freeform Radio · 24/7</p>
    </header>
    
    <!-- Main Content with Player -->
    <main class="main-content">
        <div class="player-section">
            <div class="player-container">
                <iframe 
                    src="https://nt00.xyz/public/escape_the_algorithm/embed?primary_color=000000&bg_color=000000&text_color=ffffff&rounded=1" 
                    frameborder="0" 
                    allowtransparency="true" 
                    style="width: 100%; height: 130px; border: 0; border-radius: 14px;"
                    allow="autoplay; encrypted-media"
                    title="Escape The Algorithm Radio Player">
                </iframe>
            </div>
        </div>
    </main>
    
    <!-- Footer with all requested elements -->
    <footer>
        <div class="footer-content">
            <div class="social-icons">
                <a href="https://instagram.com/escape_the_algorithm" target="_blank" rel="noopener" class="social-icon instagram">
                    <i class="fab fa-instagram"></i>
                    <span class="sr-only">Instagram</span>
                </a>
                <a href="https://youtube.com/@escapethealgorithm" target="_blank" rel="noopener" class="social-icon youtube">
                    <i class="fab fa-youtube"></i>
                    <span class="sr-only">YouTube</span>
                </a>
                <a href="https://soundcloud.com/escape_the_algorithm" target="_blank" rel="noopener" class="social-icon soundcloud">
                    <i class="fab fa-soundcloud"></i>
                    <span class="sr-only">SoundCloud</span>
                </a>
            </div>
            <p class="copyright">© 2026 Escape The Algorithm. All rights reserved.</p>
            <p class="tech-badge">Powered by AzuraCast · Cloudflare · GitHub</p>
        </div>
    </footer>

    <!-- Complete Chat Widget - FULLY WORKING -->
    <div id="simple-chat-wrapper">
        <button id="simple-chat-button">💬 Chat</button>
        <div id="simple-chat-window" style="display: none;">
            <div class="chat-header">
                <span>💬 Radio Chat</span>
                <span class="chat-timer">⏱️ 10min</span>
            </div>
            <div id="chat-messages" class="chat-messages"></div>
            <div class="chat-input-area">
                <input id="chat-input" type="text" placeholder="Type a message...">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <!-- Complete Chat JavaScript - GUARANTEED WORKING -->
    <script>
        (function() {
            // CONFIGURATION
            const SIGNALING_SERVER = 'https://ghostchat-signaling.nt00-161.workers.dev';
            const ROOM_NAME = 'escape_algorithm_radio';
            const clientId = Math.random().toString(36).substring(2, 10);
            
            // Get elements
            const button = document.getElementById('simple-chat-button');
            const chatWindow = document.getElementById('simple-chat-window');
            const messagesDiv = document.getElementById('chat-messages');
            const input = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            
            // Track seen messages
            const seenIds = new Set();
            
            // Toggle chat window
            button.onclick = function() {
                if (chatWindow.style.display === 'none' || chatWindow.style.display === '') {
                    chatWindow.style.display = 'flex';
                    button.innerHTML = '✖ Close';
                } else {
                    chatWindow.style.display = 'none';
                    button.innerHTML = '💬 Chat';
                }
            };
            
            // Display message function
            function addMessage(sender, text, isMe = false) {
                const msgDiv = document.createElement('div');
                msgDiv.style.margin = '8px 0';
                msgDiv.style.display = 'flex';
                msgDiv.style.justifyContent = isMe ? 'flex-end' : 'flex-start';
                
                const bubble = document.createElement('div');
                bubble.style.maxWidth = '80%';
                bubble.style.padding = '8px 12px';
                bubble.style.borderRadius = '18px';
                bubble.style.background = isMe ? '#333' : '#111';
                bubble.style.color = 'white';
                bubble.style.border = '1px solid #444';
                bubble.style.wordWrap = 'break-word';
                
                const nameSpan = document.createElement('div');
                nameSpan.style.fontSize = '11px';
                nameSpan.style.opacity = '0.7';
                nameSpan.style.marginBottom = '4px';
                nameSpan.style.color = '#999';
                nameSpan.textContent = isMe ? 'You' : 'Listener ' + sender.substr(0, 4);
                
                const textSpan = document.createElement('div');
                textSpan.textContent = text;
                
                bubble.appendChild(nameSpan);
                bubble.appendChild(textSpan);
                msgDiv.appendChild(bubble);
                messagesDiv.appendChild(msgDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
            
            // System message
            const systemMsg = document.createElement('div');
            systemMsg.style.cssText = 'color: #666; font-style: italic; text-align: center; margin: 8px 0; font-size: 12px;';
            systemMsg.textContent = '✨ Messages last 10 minutes.';
            messagesDiv.appendChild(systemMsg);
            
            // Send message function
            async function sendMessage() {
                const text = input.value.trim();
                if (!text) return;
                
                const msgId = Date.now() + '-' + Math.random();
                const message = {
                    id: msgId,
                    sender: clientId,
                    text: text,
                    timestamp: Date.now()
                };
                
                // Show immediately
                addMessage(clientId, text, true);
                seenIds.add(msgId);
                
                // Send to server
                try {
                    await fetch(`${SIGNALING_SERVER}?room=${ROOM_NAME}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(message)
                    });
                } catch(e) {
                    console.log('Send error:', e);
                }
                
                input.value = '';
            }
            
            // Get messages function
            async function getMessages() {
                try {
                    const res = await fetch(`${SIGNALING_SERVER}?room=${ROOM_NAME}`);
                    const messages = await res.json();
                    
                    if (Array.isArray(messages)) {
                        messages.forEach(msg => {
                            if (!seenIds.has(msg.id) && msg.sender !== clientId) {
                                seenIds.add(msg.id);
                                addMessage(msg.sender, msg.text, false);
                            }
                        });
                    }
                } catch(e) {
                    console.log('Poll error:', e);
                }
            }
            
            // Event listeners
            sendBtn.onclick = sendMessage;
            input.onkeypress = (e) => {
                if (e.key === 'Enter') sendMessage();
            };
            
            // Start polling
            setInterval(getMessages, 2000);
            getMessages();
        })();
    </script>
</body>
</html>
