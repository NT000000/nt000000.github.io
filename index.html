<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NT00 Radio - Escape The Algorithm</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="main-nav">
        <a href="index.html" class="active">🎵 Listen</a>
        <a href="schedule.html">📅 Schedule</a>
    </nav>
    
    <header>
        <h1>Escape The Algorithm</h1>
        <p class="tagline">Freeform Radio</p>
    </header>
    
    <main>
        <div class="player-container">
            <h2>Listen Live</h2>
            
          <iframe src="https://nt00.xyz/public/escape_the_algorithm/embed?primary_color=000000&bg_color=000000&text_color=ffffff&rounded=1" frameborder="0" allowtransparency="true" style="width: 100%; min-height: 150px; height: 150px; border: 0;"></iframe>
        </div>
    </main>
    
    <footer>
       <p>© 2026 Escape The Algorithm</p>
    </footer>
<!-- GhostChat - Zero Storage Chat Widget -->
    <div id="ghostchat-container" style="position: fixed; bottom: 20px; right: 20px; width: 320px; height: 400px; z-index: 1000; display: none;"></div>

    <script>
      (function() {
        // CONFIGURATION - YOUR WORKER URL
        const SIGNALING_SERVER = 'https://ghostchat-signaling.nt00-161.workers.dev';
        const ROOM_NAME = 'escape_algorithm_radio';
        
        // Create chat container
        const container = document.getElementById('ghostchat-container');
        
        // Add toggle button
        const toggleBtn = document.createElement('button');
        toggleBtn.innerHTML = '💬 Chat';
        toggleBtn.style.cssText = `
          position: fixed;
          bottom: 20px;
          right: 20px;
          background: #667eea;
          color: white;
          border: none;
          border-radius: 50px;
          padding: 12px 24px;
          font-size: 16px;
          cursor: pointer;
          box-shadow: 0 4px 15px rgba(0,0,0,0.2);
          z-index: 999;
          transition: transform 0.2s;
          font-weight: bold;
        `;
        toggleBtn.onmouseover = () => toggleBtn.style.transform = 'scale(1.05)';
        toggleBtn.onmouseout = () => toggleBtn.style.transform = 'scale(1)';
        toggleBtn.onclick = () => {
          if (container.style.display === 'none') {
            container.style.display = 'block';
            toggleBtn.innerHTML = '✖ Close Chat';
          } else {
            container.style.display = 'none';
            toggleBtn.innerHTML = '💬 Chat';
          }
        };
        document.body.appendChild(toggleBtn);
        
        // Create chat interface
        container.innerHTML = `
          <div style="display: flex; flex-direction: column; height: 100%; background: rgba(30,30,40,0.95); backdrop-filter: blur(10px); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);">
            <div style="background: #667eea; padding: 12px; color: white; font-weight: bold; display: flex; justify-content: space-between;">
              <span>💬 Radio Chat</span>
              <span style="font-size: 12px; opacity: 0.8;">✨ Ephemeral</span>
            </div>
            
            <div id="chat-messages" style="flex: 1; overflow-y: auto; padding: 12px; color: white; font-size: 14px;"></div>
            
            <div style="padding: 12px; border-top: 1px solid rgba(255,255,255,0.1);">
              <div style="display: flex; gap: 8px;">
                <input id="chat-input" type="text" placeholder="Type a message..." style="flex: 1; padding: 8px 12px; border-radius: 20px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none;">
                <button id="send-btn" style="background: #667eea; color: white; border: none; border-radius: 20px; padding: 8px 16px; cursor: pointer; font-weight: bold;">Send</button>
              </div>
              <div style="font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 8px; text-align: center;">
                ⚡ Messages auto-delete • 0% VPS RAM • Private
              </div>
            </div>
          </div>
        `;
        
        // Simple chat logic
        const peerId = Math.random().toString(36).substring(2, 8);
        const messagesDiv = document.getElementById('chat-messages');
        
        // Add system message
        const systemMsg = document.createElement('div');
        systemMsg.style.cssText = 'color: #aaa; font-style: italic; text-align: center; margin: 8px 0; font-size: 12px;';
        systemMsg.textContent = '✨ Connected. Messages vanish when you close tab.';
        messagesDiv.appendChild(systemMsg);
        
        function addMessage(sender, text, isSelf = false) {
          const msgContainer = document.createElement('div');
          msgContainer.style.cssText = `margin: 8px 0; display: flex; ${isSelf ? 'justify-content: flex-end;' : 'justify-content: flex-start;'}`;
          
          const msgBubble = document.createElement('div');
          msgBubble.style.cssText = `
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
            background: ${isSelf ? '#667eea' : 'rgba(255,255,255,0.1)'};
            color: white;
            word-wrap: break-word;
          `;
          
          const nameSpan = document.createElement('div');
          nameSpan.style.cssText = 'font-size: 11px; opacity: 0.7; margin-bottom: 4px;';
          nameSpan.textContent = sender === peerId ? 'You' : 'Listener ' + sender.substr(0, 4);
          
          const textSpan = document.createElement('div');
          textSpan.textContent = text;
          
          msgBubble.appendChild(nameSpan);
          msgBubble.appendChild(textSpan);
          msgContainer.appendChild(msgBubble);
          messagesDiv.appendChild(msgContainer);
          messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Send message function
        function sendMessage() {
          const input = document.getElementById('chat-input');
          const text = input.value.trim();
          if (!text) return;
          
          addMessage(peerId, text, true);
          
          // Broadcast via signaling server
          fetch(`${SIGNALING_SERVER}?room=${ROOM_NAME}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              sender: peerId,
              text: text,
              timestamp: Date.now()
            })
          }).catch(err => console.log('Send error:', err));
          
          input.value = '';
        }
        
        // Listen for messages
        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('chat-input').onkeypress = (e) => {
          if (e.key === 'Enter') sendMessage();
        };
        
        // Poll for messages
        setInterval(async () => {
          try {
            const response = await fetch(`${SIGNALING_SERVER}?room=${ROOM_NAME}`);
            const data = await response.json();
            
            if (data.sender && data.sender !== peerId && data.text) {
              addMessage(data.sender, data.text);
            }
          } catch (err) {
            // Silent fail - chat still works with polling
          }
        }, 2000);
        
      })();
    </script>    
</body>
</html>
